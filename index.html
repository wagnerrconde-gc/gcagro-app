<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="GC Agro" />
  <title>GC Agro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #root { min-height: 100vh; }
    #loading { display:flex; align-items:center; justify-content:center; height:100vh; font-size:18px; color:#2e7d32; font-family:sans-serif; }
  </style>
</head>
<body>
  <div id="root"><div id="loading">Carregando GC Agro...</div></div>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- Babel standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    // Carrega App.js via fetch, compila com Babel e executa
    fetch('./App.js')
      .then(r => r.text())
      .then(code => {
        const transformed = Babel.transform(code, { presets: [["react", { runtime: "classic" }]] }).code;
        const script = document.createElement('script');
        script.textContent = transformed;
        document.head.appendChild(script);

        // Agora App está definido — renderiza
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
      })
      .catch(err => {
        document.getElementById('root').innerHTML =
          '<div style="padding:20px;color:red">Erro ao carregar: ' + err.message + '</div>';
      });
  </script>
</body>
</html>
