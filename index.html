<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="GC Agro" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a5c2e" />
  <link rel="manifest" href="manifest.json?v=3" />
  <link rel="icon" href="favicon.ico?v=3" sizes="any" />
  <link rel="icon" href="icons/icon-192.png?v=3" type="image/png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png?v=3" />
  <title>GC Agro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #root { min-height: 100vh; }
    #loading { display:flex; align-items:center; justify-content:center; height:100vh; font-size:18px; color:#2e7d32; font-family:sans-serif; }
  </style>
</head>
<body>
  <div id="root"><div id="loading">Carregando GC Agro...</div></div>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- Babel standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- SheetJS (leitura de planilhas .xlsx/.xls/.csv para importação) -->
  <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script>
    // Mostra qualquer erro (de carregamento, de render do React, ou de execução em
    // qualquer outro momento) direto na tela, em vez de deixar a tela em branco sem
    // explicação — essencial pra diagnosticar problemas remotamente (ex: dado de um
    // backup importado em formato inesperado quebrando o render).
    function mostrarErroFatal(msg) {
      document.getElementById('root').innerHTML =
        '<div style="padding:20px;color:#b00;font-family:monospace;white-space:pre-wrap;">'
        + '⚠ Erro no GC Agro:\n\n' + msg
        + '\n\nTire um print desta tela e envie. Depois, tente recarregar a página.'
        + '</div>';
    }
    window.addEventListener('error', e => mostrarErroFatal(e.error ? (e.error.stack || e.error.message) : e.message));
    window.addEventListener('unhandledrejection', e => mostrarErroFatal(e.reason && e.reason.stack ? e.reason.stack : String(e.reason)));

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { erro: null }; }
      static getDerivedStateFromError(erro) { return { erro }; }
      componentDidCatch(erro, info) { console.error(erro, info); }
      render() {
        if (this.state.erro) {
          return React.createElement('div', { style: { padding: 20, color: '#b00', fontFamily: 'monospace', whiteSpace: 'pre-wrap' } },
            '⚠ Erro no GC Agro:\n\n' + (this.state.erro.stack || this.state.erro.message)
            + '\n\nTire um print desta tela e envie. Depois, tente recarregar a página.');
        }
        return this.props.children;
      }
    }

    // Carrega App.js via fetch, compila com Babel e executa.
    // Cache-bust com timestamp: garante que toda atualização publicada
    // apareça no próximo carregamento, sem precisar limpar cache manualmente.
    fetch('./App.js?t=' + Date.now(), { cache: 'no-store' })
      .then(r => r.text())
      .then(code => {
        const transformed = Babel.transform(code, { presets: [["react", { runtime: "classic" }]] }).code;
        const script = document.createElement('script');
        script.textContent = transformed;
        document.head.appendChild(script);

        // Agora App está definido — renderiza
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(ErrorBoundary, null, React.createElement(App)));
      })
      .catch(err => {
        mostrarErroFatal(err.stack || err.message);
      });
  </script>
</body>
</html>
